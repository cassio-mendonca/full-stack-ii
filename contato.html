<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <nav>
            <ul>
                <li><a href="servicos.html">Serviços</a></li>
                <li><a href="unidades.html">Unidades</a></li>
                <li><a href="index.html">A empresa</a></li>
                <li><a href="contato.html">Contato</a></li>
                <li><a href="feedback.html">Feedback</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <h1>Contato</h1>

        <section>
            <h2>Contrate-nos</h2>

            <form class="formulario">
                <label for="nome">Nome</label>
                <input type="text" id="nome" required>

                <label for="email">E-mail</label>
                <input type="email" id="email" required>

                <label for="telefone">Telefone</label>
                <input type="tel" id="telefone">

                <label for="servico">Serviço desejado</label>
                <input type="text" id="servico">

                <label for="mensagem">Mensagem</label>
                <textarea id="mensagem" rows="5"></textarea>

                <button type="submit">Enviar</button>
            </form>
        </section>

        <section>
            <h2>Trabalhe Conosco</h2>

            <form class="formulario">
                <label for="nome-candidato">Nome</label>
                <input type="text" id="nome-candidato" required>

                <label for="email-candidato">E-mail</label>
                <input type="email" id="email-candidato" required>

                <label for="telefone-candidato">Telefone</label>
                <input type="tel" id="telefone-candidato">

                <label for="cargo">Cargo de interesse</label>
                <input type="text" id="cargo">

                <label for="experiencia">Experiência</label>
                <textarea id="experiencia" rows="5"></textarea>

                <button type="submit">Enviar Currículo</button>
            </form>
        </section>

    </main>

    <footer>
        Site desenvolvido para fins acadêmicos
    </footer>

</body>
</html>
